<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一个 WebGIS 页面</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* 必须给地图容器设置高度，否则地图是隐形的 */
        #map { 
            height: 600px; 
            width: 100%;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <h1>我的第一个地图</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. 初始化地图：[纬度, 经度], 缩放等级
        const map = L.map('map').setView([36.0497, 103.8585], 15); 

        // 2. ★★★ 请在这里填入你申请到的天地图 tk ★★★
        const tk = "746c652f7654bc8233f70343c8ca9f5f"; 

        // 3. 加载天地图：卫星影像底图 (img_w)
        const tdtImg = L.tileLayer(`https://t{s}.tianditu.gov.cn/DataServer?T=img_w&x={x}&y={y}&l={z}&tk=${tk}`, {
            subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'],
            attribution: '© 天地图'
        });

        // 4. 加载天地图：地名和街道注记 (cia_w)，方便认路
        const tdtCia = L.tileLayer(`https://t{s}.tianditu.gov.cn/DataServer?T=cia_w&x={x}&y={y}&l={z}&tk=${tk}`, {
            subdomains: ['0', '1', '2', '3', '4', '5', '6', '7']
        });

        // 5. 将底图和文字注记一起添加到地图上
        tdtImg.addTo(map);
        tdtCia.addTo(map);

        // 6. 添加那个带有专属留言的标记点
        const marker = L.marker([36.0497, 103.8585]).addTo(map);
        marker.bindPopup("<b>宝贝你好呀！</b><br>我在这儿学习呢，而且很想你。").openPopup();
    </script>
</body>
</html>
